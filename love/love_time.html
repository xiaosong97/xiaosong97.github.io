<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
	<title>Love Time</title>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<style type="text/css">
		@font-face {
			font-family: digit;
			src: url('digital-7_mono.ttf') format("truetype");
		}
	</style>
</head>

<body>
	<div id="mainDiv" style="padding-top: 400px;text-align: center;font-size: 50px;">
		<p>Hello</p>
		<div id="content">
			<div id="loveHeart">
				<div id="words" style="width: auto;height: auto;">
					<div id="messages">
						Liao Qian, I have fallen in love with you for
						<div id="elapseClock"></div>
					</div>
					<div id="loveu">
						Love u forever and ever.<br/>
						<div class="signature">- Qu Song</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
<script type="text/javascript">
	var together = new Date();
	together.setFullYear(2019, 4, 12);
	together.setHours(22);
	together.setMinutes(30);
	together.setSeconds(0);
	together.setMilliseconds(0);

	function timeElapse(c){
		var e=Date();
		var f=(Date.parse(e)-Date.parse(c))/1000;
		var g=Math.floor(f/(3600*24));
		f=f%(3600*24);
		var b=Math.floor(f/3600);
		if(b<10){
			b="0"+b;
		}
		f=f%3600;
        var d=Math.floor(f/60);
		if(d<10){
			d="0"+d
		}
		f=f%60;
		if(f<10){
			f="0"+f
		}
		var a='<span class="digit">'+g
			+'</span> days <span class="digit">'+b
			+'</span> hours <span class="digit">'+d
			+'</span> minutes <span class="digit">'+f
			+"</span> seconds";
		document.getElementById("elapseClock").innerHTML = a
	}
	timeElapse(together)
	setInterval(function (){
		timeElapse(together)
	},1000)
	
</script>
</html>
